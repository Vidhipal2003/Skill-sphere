{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="row py-5">
    <div class="col-sm-10 mx-auto">
        <div class="row g-4 align-items-center">
            <div class="col-sm-6">
                <div class="card about-card p-4">
                    <h2 class="section-title">Create an Account</h2>
                    <p class="text-muted">Register to access your dashboard, lectures, notes, and assignments in one place.</p>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input name="name" type="text" required placeholder="Full Name" class="form-control mb-3" />
                        <input name="email" type="email" required placeholder="Email Address" class="form-control mb-3" />
                        <input name="mob" type="number" required placeholder="Mobile Number" class="form-control mb-3" />
                        <input name="passwd" type="password" required placeholder="Password" class="form-control mb-3" />
                        <input name="fu" type="file" required class="form-control mb-3" />
                        <textarea class="form-control mb-3" name="address" placeholder="Address" style="min-height: 100px;"></textarea>
                        <input type="submit" class="btn btn-primary-custom btn-custom w-100" value="Register Now" />
                    </form>
                </div>
            </div>
            <div class="col-sm-6">
                <img src="{% static 'images/company2.jpg' %}" class="img-fluid rounded-4 shadow-sm" alt="Register illustration" />
            </div>
        </div>
    </div>
</div>
{% endblock %}
