{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="row py-5">
    <div class="col-sm-6 mx-auto">
        <div class="card about-card p-4">
            <h2 class="section-title">Sign In</h2>
            <p class="text-muted">Access your account and continue your learning journey.</p>
            <form method="post">
                {% csrf_token %}
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="email" name="email" class="form-control" required placeholder="Email Address" />
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                    <input type="password" name="passwd" class="form-control" required placeholder="Password" />
                </div>
                <input type="submit" value="Login" class="btn btn-primary-custom btn-custom w-100" />
            </form>
        </div>
    </div>
</div>
{% endblock %}
