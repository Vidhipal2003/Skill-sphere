services:
  - type: web
    name: skillsphere
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn MyProject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DISABLE_COLLECTSTATIC
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
